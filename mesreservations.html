<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes réservations</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
}

/* ===== ANIMATION PAGE ===== */

.page{
min-height:100vh;
transform:translateX(100%);
transition:0.35s;
}

.page.active{
transform:translateX(0);
}

.page.exit{
transform:translateX(100%);
}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

.container{
padding:20px;
}

.section-title{
font-weight:700;
margin:10px 0;
font-size:15px;
color:#666;
}

.card{
background:white;
padding:18px;
border-radius:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.12);
margin-bottom:15px;
}

.card h3{
margin:0 0 8px 0;
font-size:16px;
}

.card p{
margin:4px 0;
font-size:14px;
}

button{
margin-top:12px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#e74c3c;
color:white;
font-weight:600;
cursor:pointer;
}

.empty{
text-align:center;
color:#888;
margin-top:40px;
font-weight:600;
}

/* ===== COULEURS STATUT ===== */

.status{font-weight:600;}
.status-attente{color:#f39c12;}
.status-accepte{color:#27ae60;}
.status-refuse{color:#e74c3c;}
.status-realise{color:#2980b9;}
.status-annule{color:#e74c3c;}

@media(prefers-color-scheme:dark){
body{background:#0f1115;color:white}
.card{background:#1c1f26}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}
}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>Mes réservations</h1>
</header>

<div class="container">

<div id="avenir"></div>

<div id="toggleHistory" style="margin-top:25px;font-weight:600;cursor:pointer;text-align:center;">
Voir l’historique ▼
</div>

<div id="historique" style="display:none;margin-top:15px;"></div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* ===== ANIMATION ===== */

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

function goBack(){
const p=document.getElementById("page")
p.classList.remove("active")
p.classList.add("exit")
setTimeout(()=>{location.href="index.html"},300)
}

/* ===== FIREBASE ===== */

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

/* ===== DATE CHECK ===== */

function isPast(dateStr, timeStr="00:00"){
const dateTime=new Date(dateStr+"T"+timeStr)
return dateTime < new Date()
}

/* ===== GOOGLE SHEET ===== */

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRxfmZEcNesum_QBxIe2-tEihtnRSEaVC1x8Y_S3N5MEHcV4tJY3X-7i9NdTBQTBRuzDHHW9NViYrrh/pub?gid=1049919550&single=true&output=csv"

async function loadSheet(){
const res=await fetch(sheetURL)
const text=await res.text()
const rows=text.split("\n").slice(1)
rows.reverse()

let demandes=[]

rows.forEach(r=>{
const c=r.split(",")
demandes.push({
nom:c[1],
date:c[2],
email:c[3],
statut:c[4],
commentaire:c[5]
})
})

return demandes
}

/* ===== LOCAL STORAGE ===== */

let myReservations = JSON.parse(localStorage.getItem("myReservations") || "[]")
let myMises = JSON.parse(localStorage.getItem("myMises") || "[]")

/* ===== LOAD ===== */

async function load(){

const avenir=document.getElementById("avenir")
const historique=document.getElementById("historique")

avenir.innerHTML=""
historique.innerHTML=""

let count=0

/* ===== RESERVATIONS ===== */

for(const id of myReservations){

const doc=await db.collection("reservations").doc(id).get()
if(!doc.exists) continue

const data=doc.data()
let old=isPast(data.date,data.time)

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<h3>${data.paddock}</h3>
<p><strong>Date :</strong> ${data.date}</p>
<p><strong>Heure :</strong> ${data.time}</p>
<p><strong>Durée :</strong> ${data.duration} min</p>
${!old ? `<button onclick="cancelReservation('${id}')">Annuler</button>` : ""}
`

if(old){
historique.appendChild(card)
}else{
avenir.appendChild(card)
count++
}
}

/* ===== DEMANDES ===== */

const sheetData=await loadSheet()

for(let i=myMises.length-1;i>=0;i--){

const mise=myMises[i]
let old=isPast(mise.date)

let statut="En attente"
let commentaire=""

const match=sheetData.find(d=>d.nom===mise.name && d.date===mise.date)

if(match){
statut=match.statut || "En attente"
commentaire=match.commentaire || ""
}

let statusClass="status-attente"
if(statut==="Accepté") statusClass="status-accepte"
if(statut==="Refusé") statusClass="status-refuse"
if(statut==="Réalisé") statusClass="status-realise"
if(statut==="Annulé") statusClass="status-annule"

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<h3>Mise au paddock</h3>
<p><strong>Date :</strong> ${mise.date}</p>
<p class="status ${statusClass}">
<strong>Statut :</strong> ${statut}
</p>
${commentaire ? `<p><strong>Info :</strong> ${commentaire}</p>` : ""}
`

if(old){
historique.appendChild(card)
}else{
avenir.appendChild(card)
count++
}
}

/* ===== VIDE ===== */

if(count===0){
avenir.innerHTML='<div class="empty">Aucune réservation à venir</div>'
}

}

/* ===== ANNULATION ===== */

async function cancelReservation(id){
await db.collection("reservations").doc(id).delete()
myReservations=myReservations.filter(r=>r!==id)
localStorage.setItem("myReservations",JSON.stringify(myReservations))
load()
}

/* ===== TOGGLE ===== */

document.getElementById("toggleHistory").onclick=()=>{
const hist=document.getElementById("historique")
if(hist.style.display==="none"){
hist.style.display="block"
document.getElementById("toggleHistory").innerText="Masquer l’historique ▲"
}else{
hist.style.display="none"
document.getElementById("toggleHistory").innerText="Voir l’historique ▼"
}
}

/* ===== START ===== */

load()

setInterval(()=>{load()},120000)

document.addEventListener("visibilitychange",()=>{
if(!document.hidden) load()
})

</script>

</body>
</html>
