<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes réservations</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
}

/* ===== ANIMATION PAGE ===== */

.page{
min-height:100vh;
transform:translateX(100%);
transition:0.35s;
}

.page.active{
transform:translateX(0);
}

.page.exit{
transform:translateX(100%);
}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{width:22px}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

.container{
padding:20px;
}

.section-title{
font-weight:700;
margin:10px 0;
font-size:15px;
color:#666;
}

.card{
background:white;
padding:18px;
border-radius:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.12);
margin-bottom:15px;
}

.card h3{
margin:0 0 8px 0;
font-size:16px;
}

.card p{
margin:4px 0;
font-size:14px;
}

button{
margin-top:12px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#e74c3c;
color:white;
font-weight:600;
cursor:pointer;
}

.card-number-form{
display:flex;
gap:10px;
margin-top:12px;
}

.card-number-form input{
min-width:0;
flex:1;
padding:12px;
border:1px solid #d8d8d8;
border-radius:10px;
background:white;
color:#222;
font:inherit;
font-size:16px;
box-sizing:border-box;
}

.card-number-form button{
width:auto;
margin-top:0;
background:#2980b9;
}

.progress{
height:11px;
margin:12px 0 8px;
border-radius:999px;
background:#e5e7eb;
overflow:hidden;
}

.progress-bar{
height:100%;
border-radius:inherit;
transition:width 0.5s ease;
}

.progress-green{background:linear-gradient(90deg,#27ae60,#2ecc71)}
.progress-orange{background:linear-gradient(90deg,#e67e22,#f39c12)}
.progress-red{background:linear-gradient(90deg,#c0392b,#e74c3c)}

.card-complete{
color:#e74c3c;
font-weight:700;
}

.card-message{
color:#e74c3c;
font-weight:600;
line-height:1.5;
}

.card-loading{
color:#888;
font-weight:600;
}

.empty{
text-align:center;
color:#888;
margin-top:40px;
font-weight:600;
}

/* ===== COULEURS STATUT ===== */

.status{font-weight:600;}
.status-attente{color:#f39c12;}
.status-accepte{color:#27ae60;}
.status-refuse{color:#e74c3c;}
.status-realise{color:#2980b9;}
.status-annule{color:#e74c3c;}

@media(prefers-color-scheme:dark){
body{background:#0f1115;color:white}
.card{background:#1c1f26}
.section-title{color:#aaa}

.card-number-form input{
background:#12141a;
border-color:#3a3f49;
color:white;
}

.progress{background:#343943}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}
}

</style>
</head>

<body>

<div class="page" id="page">

<header>
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg" alt="Retour">
</div>
<h1>Mes réservations</h1>
</header>

<div class="container">

<div id="paddockCard"></div>

<div id="avenir"></div>

<div id="toggleHistory" style="margin-top:25px;font-weight:600;cursor:pointer;text-align:center;">
Voir l’historique ▼
</div>

<div id="historique" style="display:none;margin-top:15px;"></div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* ===== ANIMATION ===== */

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

function goBack(){
const p=document.getElementById("page")
p.classList.remove("active")
p.classList.add("exit")
setTimeout(()=>{location.href="index.html"},300)
}

/* ===== FIREBASE ===== */

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

/* ===== DATE CHECK ===== */

function isPast(dateStr, timeStr="00:00"){
const dateTime=new Date(dateStr+"T"+timeStr)
return dateTime < new Date()
}

/* ===== GOOGLE SHEETS ===== */

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRxfmZEcNesum_QBxIe2-tEihtnRSEaVC1x8Y_S3N5MEHcV4tJY3X-7i9NdTBQTBRuzDHHW9NViYrrh/pub?gid=1049919550&single=true&output=csv"
const sheetCartesURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRxfmZEcNesum_QBxIe2-tEihtnRSEaVC1x8Y_S3N5MEHcV4tJY3X-7i9NdTBQTBRuzDHHW9NViYrrh/pub?gid=1776451835&single=true&output=csv"

async function loadSheet(){
const res=await fetch(sheetURL)
const text=await res.text()
const rows=text.split("\n").slice(1)
rows.reverse()

let demandes=[]

rows.forEach(r=>{
const c=r.split(",")
demandes.push({
nom:c[1],
date:c[2],
email:c[3],
statut:c[4],
commentaire:c[5]
})
})

return demandes
}

function parseCSV(text){
const rows=[]
let row=[]
let value=""
let quoted=false

for(let i=0;i<text.length;i++){
const char=text[i]

if(char==='"'){
if(quoted && text[i+1]==='"'){
value+='"'
i++
}else{
quoted=!quoted
}
}else if(char==="," && !quoted){
row.push(value)
value=""
}else if((char==="\n" || char==="\r") && !quoted){
if(char==="\r" && text[i+1]==="\n") i++
row.push(value)
if(row.some(cell=>cell.trim()!=="")) rows.push(row)
row=[]
value=""
}else{
value+=char
}
}

row.push(value)
if(row.some(cell=>cell.trim()!=="")) rows.push(row)
return rows
}

function normalizeHeader(value){
return value.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

function normalizeCardNumber(value){
return String(value || "").trim().replace(/^'+/,"").toUpperCase()
}

function escapeHTML(value){
return String(value ?? "").replace(/[&<>'"]/g,char=>({
"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"
})[char])
}

async function loadCardsSheet(){
const res=await fetch(sheetCartesURL,{cache:"no-store"})
if(!res.ok) throw new Error("Impossible de charger les cartes")

const rows=parseCSV(await res.text())
if(rows.length===0) return []

const headers=rows[0].map(normalizeHeader)
return rows.slice(1).map(row=>Object.fromEntries(
headers.map((header,index)=>[header,(row[index] || "").trim()])
))
}

/* ===== CARTE DE MISES ===== */

function showCardNumberForm(message=""){
const paddockCard=document.getElementById("paddockCard")
paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
${message ? `<p class="card-message">${escapeHTML(message)}</p>` : `<p>Entrez votre numéro de carte pour consulter vos mises.</p>`}
<form class="card-number-form" id="cardNumberForm">
<input id="cardNumberInput" type="text" inputmode="text" autocomplete="off" placeholder="Numéro de carte" aria-label="Numéro de carte" required>
<button type="submit">Enregistrer</button>
</form>
</div>`

document.getElementById("cardNumberForm").addEventListener("submit",event=>{
event.preventDefault()
const number=normalizeCardNumber(document.getElementById("cardNumberInput").value)
if(!number) return
localStorage.setItem("paddockCardNumber",number)
loadPaddockCard()
})
}

function changePaddockCard(){
localStorage.removeItem("paddockCardNumber")
showCardNumberForm()
}

async function loadPaddockCard(){
const paddockCard=document.getElementById("paddockCard")
const savedNumber=normalizeCardNumber(localStorage.getItem("paddockCardNumber"))

if(!savedNumber){
showCardNumberForm()
return
}

paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p class="card-loading">Actualisation de la carte...</p>
</div>`

try{
const cards=await loadCardsSheet()
const card=cards.find(item=>normalizeCardNumber(item.numero)===savedNumber)

if(!card){
paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p><strong>Numéro :</strong> ${escapeHTML(savedNumber)}</p>
<p class="card-message">Carte introuvable. Vérifiez votre numéro ou contactez l’accueil.</p>
<button type="button" onclick="changePaddockCard()">Changer de carte</button>
</div>`
return
}

const remaining=Math.max(0,Number(String(card.restant).replace(",",".")) || 0)
const total=Math.max(0,Number(String(card.total).replace(",",".")) || 0)
const progress=total > 0 ? Math.min(100,Math.max(0,(remaining / total) * 100)) : 0
const lastUse=card.derniere_mise || "Aucune mise enregistrée"
const progressColor=remaining >= 5 ? "progress-green" : remaining >= 2 ? "progress-orange" : "progress-red"
const remainingDisplay=remaining === 0
? '<span class="card-complete">Carte complète</span>'
: `${escapeHTML(card.restant || "0")} / ${escapeHTML(card.total || "0")}`

paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p><strong>Numéro :</strong> ${escapeHTML(card.numero || savedNumber)}</p>
<p><strong>Mises restantes :</strong> ${remainingDisplay}</p>
<div class="progress" role="progressbar" aria-label="Mises restantes" aria-valuemin="0" aria-valuemax="${escapeHTML(total)}" aria-valuenow="${escapeHTML(remaining)}">
<div class="progress-bar ${progressColor}" style="width:${progress}%"></div>
</div>
<p><strong>Dernière mise :</strong> ${escapeHTML(lastUse)}</p>
<button type="button" onclick="changePaddockCard()">Changer de carte</button>
</div>`
}catch(error){
console.error(error)
paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p class="card-message">Impossible d’actualiser la carte pour le moment.</p>
<button type="button" onclick="loadPaddockCard()">Réessayer</button>
<button type="button" onclick="changePaddockCard()">Changer de carte</button>
</div>`
}
}

/* ===== LOCAL STORAGE ===== */

let myReservations = JSON.parse(localStorage.getItem("myReservations") || "[]")
let myMises = JSON.parse(localStorage.getItem("myMises") || "[]")

/* ===== LOAD ===== */

async function load(){

loadPaddockCard()

const avenir=document.getElementById("avenir")
const historique=document.getElementById("historique")

avenir.innerHTML=""
historique.innerHTML=""

let count=0

/* ===== RESERVATIONS ===== */

for(const id of myReservations){

const doc=await db.collection("reservations").doc(id).get()
if(!doc.exists) continue

const data=doc.data()
let old=isPast(data.date,data.time)

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<h3>${data.paddock}</h3>
<p><strong>Date :</strong> ${data.date}</p>
<p><strong>Heure :</strong> ${data.time}</p>
<p><strong>Durée :</strong> ${data.duration} min</p>
${!old ? `<button onclick="cancelReservation('${id}')">Annuler</button>` : ""}
`

if(old){
historique.appendChild(card)
}else{
avenir.appendChild(card)
count++
}
}

/* ===== DEMANDES ===== */

const sheetData=await loadSheet()

for(let i=myMises.length-1;i>=0;i--){

const mise=myMises[i]
let old=isPast(mise.date)

let statut="En attente"
let commentaire=""

const match=sheetData.find(d=>d.nom===mise.name && d.date===mise.date)

if(match){
statut=match.statut || "En attente"
commentaire=match.commentaire || ""
}

let statusClass="status-attente"
if(statut==="Accepté") statusClass="status-accepte"
if(statut==="Refusé") statusClass="status-refuse"
if(statut==="Réalisé") statusClass="status-realise"
if(statut==="Annulé") statusClass="status-annule"

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<h3>Mise au paddock</h3>
<p><strong>Date :</strong> ${mise.date}</p>
<p class="status ${statusClass}">
<strong>Statut :</strong> ${statut}
</p>
${commentaire ? `<p><strong>Info :</strong> ${commentaire}</p>` : ""}
`

if(old){
historique.appendChild(card)
}else{
avenir.appendChild(card)
count++
}
}

/* ===== VIDE ===== */

if(count===0){
avenir.innerHTML='<div class="empty">Aucune réservation à venir</div>'
}

}

/* ===== ANNULATION ===== */

async function cancelReservation(id){
await db.collection("reservations").doc(id).delete()
myReservations=myReservations.filter(r=>r!==id)
localStorage.setItem("myReservations",JSON.stringify(myReservations))
load()
}

/* ===== TOGGLE ===== */

document.getElementById("toggleHistory").onclick=()=>{
const hist=document.getElementById("historique")
if(hist.style.display==="none"){
hist.style.display="block"
document.getElementById("toggleHistory").innerText="Masquer l’historique ▲"
}else{
hist.style.display="none"
document.getElementById("toggleHistory").innerText="Voir l’historique ▼"
}
}

/* ===== START ===== */

load()

setInterval(()=>{load()},120000)

document.addEventListener("visibilitychange",()=>{
if(!document.hidden) load()
})

</script>

</body>
</html>
