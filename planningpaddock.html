<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation paddock</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--sheet-bg:white;
--sheet-text:black;
}

@media(prefers-color-scheme:dark){
:root{
--sheet-bg:#1c1f26;
--sheet-text:white;
}
}
  
body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
}
  
.page{min-height:100vh;}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
height:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

.card{
background:white;
margin:20px;
padding:22px;
border-radius:22px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

label{font-weight:600;font-size:14px;}

input,
select,
textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:10px;
border:none;
background:#f4f4f4;
font-size:16px !important;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#181E3B;
color:white;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

.dayBtn{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:#f4f4f4;
text-align:center;
cursor:pointer;
font-weight:600;
}

.dayBtn.active{
background:#181E3B;
color:white;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.row.free{cursor:pointer}

.row.selected{
background:#c9d7ff;
border-left:4px solid #181E3B;
}

.freeText{color:#2ecc71;font-weight:600;}
.reservedText{color:#e74c3c;font-weight:600;}
.mineText{color:#2980b9;font-weight:700;}

.fullMessage{
text-align:center;
padding:15px;
font-weight:600;
color:#999;
}

/* DARK MODE */

@media(prefers-color-scheme:dark){

body{
background:#0f1115;
color:white;
}

.card{
background:#1c1f26;
}

select,input{
background:#252a33;
color:white;
}

.row{
border-bottom:1px solid #333;
}

.dayBtn{
background:#252a33;
}

.sheetNew{
background:#3246d3;
}

.sheetFinish{
background:#2ecc71;
}

.sheetNew,
.sheetFinish{
color:white;
}

#confirmSheet{
background:#1c1f26;
color:white;
}

/* bouton retour identique aux autres pages */

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}

}
/* BANDEAU CONFIRMATION */

#confirmSheet{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:var(--sheet-bg);
color:var(--sheet-text);
border-radius:22px 22px 0 0;
box-shadow:0 -10px 40px rgba(0,0,0,0.25);
transition:0.35s;
z-index:999;
}

#confirmSheet.show{
bottom:0;
}

.sheetContent{
padding:26px;
text-align:center;
}

.sheetBtn{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.sheetNew{
background:#181E3B;
color:white;
}

.sheetFinish{
background:#2ecc71;
color:white;
}
</style>
</head>

<body>

<div class="page">

<header>
<div id="backBtn" onclick="location.href='index.html'">
<img src="image/back.svg">
</div>
<h1 id="title">PADDOCK</h1>
</header>

<div class="card">

<label>Type</label>
<select id="type">
<option value="reservation">Réservation paddock</option>
<option value="mise">Demande mise au paddock (+5€)</option>
</select>

<div id="blocDuration">
<label>Durée</label>
<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>
</div>

<div id="blocPaddock">
<label>Paddock</label>
<select id="paddock"></select>
</div>

<label>Jour</label>
<div id="days"></div>

<label>Prénom</label>
<input id="name">

<label>Email (optionnel)</label>
<input id="email">

<div id="planning"></div>

<button id="mainButton" onclick="book()">Réserver</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("03cdce-AcdCC03k_v")

const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()
function showSheet(title,text){

document.getElementById("sheetTitle").innerText = title
document.getElementById("sheetText").innerHTML = text
document.getElementById("confirmSheet").classList.add("show")

}

function closeSheet(){

document.getElementById("confirmSheet").classList.remove("show")

}

let reservations=[]
let horaires={}
let selectedDate=null
let selected=null

let adminMode=false
let tapCount=0

const title=document.getElementById("title")

title.addEventListener("click",()=>{

tapCount++

if(tapCount>=5){

if(!adminMode){

const pass=prompt("Mot de passe admin")

if(pass==="0359140"){
adminMode=true
title.innerHTML="PADDOCK 🔧"
generate()
}

}else{

adminMode=false
title.innerHTML="PADDOCK"
generate()

}

tapCount=0

}

setTimeout(()=>{tapCount=0},1200)

})

let myReservations=JSON.parse(localStorage.getItem("myReservations")||"[]")

const durationSelect=document.getElementById("duration")
const paddockSelect=document.getElementById("paddock")

function initType(){

const typeSelect=document.getElementById("type")

typeSelect.addEventListener("change",()=>{

const mise=typeSelect.value==="mise"

document.getElementById("blocDuration").style.display=mise?"none":"block"
document.getElementById("blocPaddock").style.display=mise?"none":"block"
document.getElementById("planning").style.display=mise?"none":"block"

document.getElementById("mainButton").innerText=mise?"Demander":"Réserver"

})

}

function updatePaddocks(){

const duration=durationSelect.value

paddockSelect.innerHTML=""

if(duration==="90"){

paddockSelect.innerHTML=`
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
`

}else{

paddockSelect.innerHTML=`
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
`

}

generate()

}

durationSelect.addEventListener("change",updatePaddocks)

function loadDataRealtime(){

db.collection("reservations").onSnapshot(snapshot=>{

reservations = []

snapshot.forEach(doc=>{
let data = doc.data()
data.id = doc.id
reservations.push(data)
})

generate()

})

db.collection("horaires").onSnapshot(snapshot=>{

horaires = {}

snapshot.forEach(doc=>{
horaires[doc.id] = doc.data()
})

generate()

})

}

function buildDays(){

const container=document.getElementById("days")
container.innerHTML=""

for(let i=0;i<3;i++){

let d=new Date()
d.setDate(d.getDate()+i)

let label=i===0?"Aujourd’hui":i===1?"Demain":"Après-demain"

let btn=document.createElement("div")
btn.className="dayBtn"

btn.innerText=label+" "+d.getDate()

btn.onclick=()=>{

selectedDate=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")

document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

generate()

}

container.appendChild(btn)

if(i===0){
btn.classList.add("active")
selectedDate=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")
}

}

}

function generate(){

const paddock=paddockSelect.value
const duration=parseInt(durationSelect.value)

if(!paddock)return

const container=document.getElementById("planning")
container.innerHTML=""

const parts=selectedDate.split("-")
const d=new Date(parts[0],parts[1]-1,parts[2])

const names=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]

let jour=names[d.getDay()]

if(!horaires[paddock] || !horaires[paddock][jour] || horaires[paddock][jour].closed){

container.innerHTML='<div class="fullMessage">Paddock fermé</div>'
return

}

const config=horaires[paddock][jour]

let start=parseInt(config.open.split(":")[0])
let end=parseInt(config.close.split(":")[0])

let slots=[]
let current=start

while(current < end){

let hour=Math.floor(current)
let minutes=current%1===0 ? "00" : "30"

let time=String(hour).padStart(2,"0")+":"+minutes

slots.push(time)

let reservation=reservations.find(r=>{

if(r.date!==selectedDate) return false
if(r.paddock!==paddock) return false

let [rh,rm]=r.time.split(":").map(Number)

let resStart=rh+(rm/60)

return resStart===current

})

if(reservation){
current += reservation.duration/60
}else{
current += 1
}

}

slots.forEach(time=>{

let [hour,minutes]=time.split(":").map(Number)

const now=new Date()
const today=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0")

let slotTime=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hour,minutes)

if(!adminMode && selectedDate===today){

let diff=(slotTime-now)/60000

if(diff<10) return

}

if(hour+(minutes/60)+(duration/60) > end) return

let conflict=false
let mine=false
let docId=null
let reserverName=""

reservations.forEach(r=>{

if(r.date===selectedDate && r.paddock===paddock){

let [rh,rm]=r.time.split(":").map(Number)

let resStart=rh+(rm/60)
let resEnd=resStart+(r.duration/60)

let slotStart=hour+(minutes/60)

if(slotStart>=resStart && slotStart<resEnd){

conflict=true
reserverName=r.name

if(myReservations.includes(r.id)){
mine=true
docId=r.id
}

if(adminMode){
docId=r.id
}

}

}

})

let row=document.createElement("div")

if(mine){

row.className="row"
row.innerHTML=`<div>${time}</div><div class="mineText">Annuler</div>`
row.onclick=()=>cancelReservation(docId)

}

else if(!conflict){

row.className="row free"

row.innerHTML=`<div>${time}</div><div class="freeText">libre</div>`

row.onclick=()=>{

selected={time,paddock,date:selectedDate,duration}

document.querySelectorAll(".row").forEach(r=>r.classList.remove("selected"))

row.classList.add("selected")

}

}

else{

row.className="row"

if(adminMode){

row.innerHTML=`<div>${time}</div><div class="reservedText">${reserverName}</div>`
row.onclick=()=>cancelReservation(docId)

}else{

row.innerHTML=`<div>${time}</div><div class="reservedText">réservé</div>`

}

}

container.appendChild(row)

})

}

async function book(){

const type=document.getElementById("type").value

if(type==="mise"){

if(!selectedDate){
alert("Choisissez un jour")
return
}

const d=new Date(selectedDate)
const day=d.getDay()

if(day===0 || day===6){
alert("Demande impossible le week-end")
return
}

const now=new Date()
const veille=new Date(d)

veille.setDate(veille.getDate()-1)
veille.setHours(20,0,0,0)

if(now>veille){
alert("Demande possible uniquement jusqu'à 20h la veille")
return
}

let name=document.getElementById("name").value.trim()
let email=document.getElementById("email").value.trim()

if(!name){
alert("Prénom obligatoire")
return
}

emailjs.send("service_mkpsbdf","template_0qhjhhg",{
title: "📩 Demande de mise au paddock",
message: `
📅 <strong>Jour :</strong> ${selectedDate}<br><br>

<span style="color:#e67e22;font-weight:600;">
⏳ En attente de confirmation
</span>
`,
prenom: name,
email: email
}).then(()=>{

// envoi vers Google Form
fetch("https://docs.google.com/forms/d/e/1FAIpQLScqcDgOy64o6ZyVuLlQrgPbAR60yIoMZzChOANrA_ZzyAD-xg/formResponse",{
method:"POST",
mode:"no-cors",
body:new URLSearchParams({
"entry.45941897":name,
"entry.1156384077":selectedDate,
"entry.502902379":email
})
})

// stockage local
let mises = JSON.parse(localStorage.getItem("myMises") || "[]")

mises.push({
date:selectedDate,
name:name
})

localStorage.setItem("myMises", JSON.stringify(mises))

showSheet(
"Demande envoyée",
"Jour : "+selectedDate+"<br>Nous vous confirmerons la mise au paddock."
)

}).catch(()=>{

showSheet(
"Erreur",
"L'envoi du mail a échoué."
)

})

return

}

let name=document.getElementById("name").value.trim()

if(!name){
alert("Prénom obligatoire")
return
}

if(!selected){
alert("Choisissez un créneau")
return
}

if(!adminMode){

if(reservations.find(r=>r.date===selected.date && r.name.toLowerCase()===name.toLowerCase())){
alert("Vous avez déjà une réservation ce jour")
return
}

}

const doc = await db.collection("reservations").add({

name:name,
email:document.getElementById("email").value,
paddock:selected.paddock,
date:selected.date,
time:selected.time,
duration:selected.duration

})

let email = document.getElementById("email").value.trim()

// 👉 toujours envoyer à toi
emailjs.send("service_mkpsbdf","template_0qhjhhg",{
title: "📥 Nouvelle réservation paddock",
message: `
📍 <strong>Paddock :</strong> ${selected.paddock}<br>
📅 <strong>Jour :</strong> ${selected.date}<br>
⏰ <strong>Heure :</strong> ${selected.time}<br><br>

👤 <strong>Client :</strong> ${name}<br>
📧 <strong>Email :</strong> ${email || "Non renseigné"}
`,
prenom: name,
email: "damiensiri.pro@hotmail.fr"
})

// 👉 envoi client uniquement si email
if(email && email.includes("@")){

emailjs.send("service_mkpsbdf","template_0qhjhhg",{
title: "✅ Réservation confirmée",
message: `
📍 <strong>Paddock :</strong> ${selected.paddock}<br>
📅 <strong>Jour :</strong> ${selected.date}<br>
⏰ <strong>Heure :</strong> ${selected.time}<br><br>

<span style="color:#2ecc71;font-weight:600;">
✔️ Créneau réservé avec succès
</span>
`,
prenom: name,
email: email
})
}

// 👉 TOUJOURS exécuté (important)
myReservations.push(doc.id)

localStorage.setItem("myReservations",JSON.stringify(myReservations))

showSheet(
"Réservation confirmée",
"Paddock : "+selected.paddock+"<br>"+
"Jour : "+selected.date+"<br>"+
"Heure : "+selected.time
)

}


async function cancelReservation(id){

await db.collection("reservations").doc(id).delete()

myReservations=myReservations.filter(r=>r!==id)

localStorage.setItem("myReservations",JSON.stringify(myReservations))

showSheet(
"Réservation annulée",
"Le créneau a été libéré."
)

}

window.addEventListener("DOMContentLoaded",()=>{

initType()
buildDays()
updatePaddocks()
loadDataRealtime()

})

paddockSelect.onchange=generate
  
</script>
<div id="confirmSheet">

<div class="sheetContent">

<h3 id="sheetTitle"></h3>

<div id="sheetText"></div>

<button class="sheetBtn sheetNew" onclick="closeSheet()">
Nouvelle réservation
</button>

<button class="sheetBtn sheetFinish" onclick="location.href='mesreservations.html'">
Terminer
</button>

</div>
  
</div>

</body>
</html>
