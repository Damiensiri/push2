[vars]
ENVIRONMENT = "production"
PUSH_ENABLED = "true"
ONESIGNAL_APP_ID = "85a477ff-3d8d-4975-960d-c7e69100a0ff"
ALLOWED_ORIGIN = "https://app.damiensiri.com,http://127.0.0.1:8000"

[[d1_databases]]
binding = "DB"
