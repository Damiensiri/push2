/* ================= VARIABLES ================= */

:root{
  --bg:#f4f4f4;
  --header-bg:#f4f4f4;
  --text:#181E3B;
  --card-bg:#ffffff;
  --section-bg:#181E3B;

}

@media (prefers-color-scheme: dark){

    --bg:#0f1115;

    --text:#ffffff;
    --card-bg:#1c1f26;
    --section-bg:#ffffff;
    --section-text:#000000;
    --shadow:0 10px 30px rgba(0,0,0,0.6);
  }

      brightness(0) invert(1)
      drop-shadow(0 0 6px rgba(255,255,255,0.5));

}

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-y:auto;
}

/* ================= HEADER ================= */

  top:0;
  left:0;
  width:100%;
  height:70px;
  background:var(--header-bg);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;

.header-left{
  position:absolute;
  left:12px;
}

.header-left img{
  height:40px;
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:700;
}

/* ================= BELL ================= */

#bellBox{
  position:absolute;
  right:12px;
  font-size:22px;
  cursor:pointer;
}

#bellBadge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  width:16px;
  height:16px;
  font-size:10px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* ================= CONTENT ================= */

.page-content{
  margin-top:70px;
}

/* ================= TITLES ================= */

#welcome{
  text-align:center;
  font-size:36px;
  font-weight:700;

}

/* ===== STATUT HORAIRES ===== */

#opening-status{
  text-align:center;
  margin-bottom:16px; /* 16px validé */
  display:none;
  font-size:15px;
  font-weight:600;
}

/* ================= BANDEAU ================= */

#alert-wrapper{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
}

#alert-box{
  width:100%;
  height:27px;
  background:#E88B00;
  display:none;
  align-items:center;
  gap:8px;
  padding:0 12px;
  box-sizing:border-box;
  color:white;
  font-size:14px;
  font-weight:500;
  transform:translateY(-100%);
  opacity:0;
  transition:transform .4s ease, opacity .4s ease;
}

#alert-box.show{
  transform:translateY(0);
  opacity:1;
}

/* ================= SECTIONS ================= */

.section-title{
  background:var(--section-bg);
  color:var(--section-text);
  display:inline-block;
  padding:6px 14px;
  margin:20px 15px 10px;

<script>

/* ===== ALERT + STATUT HORAIRES ===== */

const SHEET_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/statuts";
const HORAIRES_URL="https://opensheet.elk.sh/1-VbRioKfM6JHU-Oep0pa6H3S0VVuvYLyUMXTdSdRbzI/horaires";
const ESPACE="accueil";

function getTodayName(){
  return ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"][new Date().getDay()];
}

function parseTime(str){
  const p=str.split(":");
  return {h:parseInt(p[0]), m:parseInt(p[1])};
}

function isNowBetween(open,close){
  const now=new Date();
  const o=new Date(); o.setHours(open.h,open.m,0,0);
  const c=new Date(); c.setHours(close.h,close.m,0,0);
  return now>=o && now<=c;
}

function loadAll(){

  const alertBox=document.getElementById("alert-box");
  const status=document.getElementById("opening-status");

  alertBox.innerHTML="";
  alertBox.classList.remove("show");
  alertBox.style.display="none";
  status.style.display="none";

  fetch(SHEET_URL,{cache:"no-store"})
  .then(r=>r.json())
  .then(data=>{

    const row=data.find(e=>e.espace===ESPACE);

    if(row && row.alerte && row.alerte.trim()!==""){

      alertBox.style.display="flex";

      const icon=document.createElement("img");
      icon.src="https://static.wixstatic.com/shapes/ff7f34_8db0b910e97b4e37af20514452d5c4f4.svg";
      icon.style.width="16px";

      const text=document.createElement("div");
      text.textContent=row.alerte;

      alertBox.appendChild(icon);
      alertBox.appendChild(text);

      setTimeout(()=>{ alertBox.classList.add("show"); },50);
      return;
    }

    fetch(HORAIRES_URL,{cache:"no-store"})
    .then(r=>r.json())
    .then(data=>{

      const today=getTodayName();
      const row=data.find(r=>r.jour?.toLowerCase()===today);
      if(!row||!row.ouvert||!row.ferme) return;

      const open=parseTime(row.ouvert);
      const close=parseTime(row.ferme);

      status.style.display="block";

      if(isNowBetween(open,close)){
        status.style.color="#2e7d32";
        status.textContent=`Écuries ouvertes ${row.ouvert.substring(0,5)} – ${row.ferme.substring(0,5)}`;
      }else{
        status.style.color="#c0392b";
        status.textContent=`Écuries fermées ${row.ouvert.substring(0,5)} – ${row.ferme.substring(0,5)}`;
      }

    });

  });
}

loadAll();
setInterval(loadAll,60000);

</script>

<script>

/* ===== CLOCHE (VERSION COMPLÈTE AVEC FILTRE EXPIRATION) ===== */

const API_URL="https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrRY09nECq5kqJEPaFCkMRnR4qbM-Z9y5KOMgVdlakJAA_L1FlwHMDN84Nstw8qXhqpt9QHGCeU6Sr6aLk3y7hSeA-1vr_eBBQYFwVL111h-CJZc8JxRQKvcu3XE7Gg-OXbXE8Vkp1PlAMHAkhJduQw6bxUswIvR7b1rA8txQ2Rtyl25eNxQWvtBet3bytcH6RpMKvJdyZcSioOtKa5sYL4uRI4FOoFrfUzX5P_pjpK-cAN8Bdf6otVcK4myQl66GohjWiPVOyCuofXOq8M4lQkmsxucwQ&lib=MfQh9XKIUpdlMRcOJ4l9JImAGFOlNCMp3";

const STORAGE_KEY="alerts_lues";

function getLues(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }catch(e){
    return [];
  }
}

function parseDateFR(str){
  if(!str) return null;

  if(str.includes("-")){
    const p=str.split("-");
    return new Date(p[0],p[1]-1,p[2],0,0,0);
  }

  if(str.includes("/")){
    const p=str.split("/");
    return new Date(p[2],p[1]-1,p[0],0,0,0);
  }

  return null;
}

async function updateBell(){

  const badge=document.getElementById("bellBadge");

  try{

    const res=await fetch(API_URL,{cache:"no-store"});
    const data=await res.json();

    const today=new Date();
    today.setHours(0,0,0,0);

    const lues=getLues().map(String);
    let count=0;

    data
      .filter(n=>{

        if(n.epingle==="oui") return true;
        if(n.active!=="oui") return false;

        if(!n.expire){
          const d=parseDateFR(n.date);
          if(!d) return true;
          return d>=today;
        }

        const exp=parseDateFR(n.expire);
        if(!exp) return true;
        return exp>=today;

      })
      .forEach(n=>{
        if(!lues.includes(String(n.id))){
          count++;
        }
      });

    badge.style.display = count>0 ? "flex" : "none";
    badge.textContent = count;

  }catch(e){
    badge.style.display="none";
  }
}

updateBell();
setInterval(updateBell,60000);

</script>
