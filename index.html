<style>

/* ================= VARIABLES ================= */

:root{
  --bg:#f4f4f4;
  --header-bg:#f4f4f4;
  --text:#181E3B;
  --card-bg:#ffffff;
  --section-bg:#181E3B;
  --section-text:#ffffff;
  --shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* ===== DARK MODE ===== */

@media (prefers-color-scheme: dark){

  :root{
    --bg:#0f1115;
    --header-bg:#0f1115;
    --text:#ffffff;
    --card-bg:#1c1f26;
    --section-bg:#ffffff;
    --section-text:#000000;
    --shadow:0 10px 30px rgba(0,0,0,0.6);
  }

  .header-left img{
    filter:brightness(0) invert(1)
           drop-shadow(0 0 8px rgba(255,255,255,0.7));
  }

}

/* ================= BASE ================= */

html,body{
  margin:0;
  height:100%;
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= HEADER ================= */

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:64px;
  background:var(--header-bg);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-left{
  position:absolute;
  left:12px;
}

.header-left img{
  height:40px;
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:700;
}

/* ================= BELL ================= */

#bellBox{
  position:absolute;
  right:12px;
  font-size:22px;
  cursor:pointer;
}

#bellBadge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  width:16px;
  height:16px;
  font-size:10px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* ================= CONTENT ================= */

.page-content{
  position:fixed;
  top:20px;
  left:0;
  right:0;
  bottom:0;
  overflow-y:auto;
  padding-bottom:20px;
}

#welcome{
  text-align:center;
  font-size:44px;
  font-weight:700;
  margin:35px 0 16px;
}

#opening-status{
  text-align:center;
  margin-bottom:16px;
  display:none;
  font-size:15px;
  font-weight:600;
}

/* ================= ALERT ================= */

#alert-wrapper{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
}

#alert-box{
  width:100%;
  height:27px;
  background:#E88B00;
  display:none;
  align-items:center;
  gap:8px;
  padding:0 12px;

  font-size:14px;

  transition:transform .4s ease, opacity .4s ease;
}

#alert-box.show{

  opacity:1;
}

/* ================= SECTIONS ================= */

.section-title{

<script>

function go(url){window.location.href=url;}
function openExternal(url){window.open(url,"_blank");}

const STATUTS_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=statuts";
const HORAIRES_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=horaires";
const EXCEPTIONS_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=exceptions";

function formatTime(val){
if(!val) return "--:--";
if(val.includes("T")){
const d=new Date(val);
return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
}
return val.substring(0,5);
}

async function updateUI(){

const status=document.getElementById("opening-status");
const alertBox=document.getElementById("alert-box");

try{

const [statuts,horaires,exceptions]=await Promise.all([
fetch(STATUTS_URL).then(r=>r.json()),
fetch(HORAIRES_URL).then(r=>r.json()),
fetch(EXCEPTIONS_URL).then(r=>r.json())
]);

const accueil=statuts.find(e=>e.espace==="accueil");

if(accueil && accueil.alerte){
alertBox.style.display="flex";
alertBox.innerHTML="⚠️ "+accueil.alerte;
setTimeout(()=>alertBox.classList.add("show"),50);
return;
}

const today=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"][new Date().getDay()];

const ex=exceptions.find(e=>{
const d=new Date(e.date);
const day=d.toLocaleDateString("fr-FR",{weekday:"long"}).toLowerCase();
return day===today;
});

if(ex){
status.style.display="block";
status.style.color="#c0392b";
status.textContent=ex.message;
return;
}

const h=horaires.find(r=>r.jour.toLowerCase()===today);

const open=formatTime(h.ouvert);
const close=formatTime(h.ferme);

status.style.display="block";

const [oh,om]=open.split(":");
const [ch,cm]=close.split(":");

const now=new Date();
const o=new Date();o.setHours(oh,om,0,0);
const c=new Date();c.setHours(ch,cm,0,0);

if(now>=o && now<=c){
status.style.color="#2e7d32";
status.textContent=`Écuries ouvertes ${open} – ${close}`;
}else{
status.style.color="#c0392b";
status.textContent=`Écuries fermées ${open} – ${close}`;
}

}catch(e){}

}

updateUI();
setInterval(updateUI,10000);

</script>

<script>

/* CLOCHE */

const API_URL="https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrRY09nECq5kqJEPaFCkMRnR4qbM-Z9y5KOMgVdlakJAA_L1FlwHMDN84Nstw8qXhqpt9QHGCeU6Sr6aLk3y7hSeA-1vr_eBBQYFwVL111h-CJZc8JxRQKvcu3XE7Gg-OXbXE8Vkp1PlAMHAkhJduQw6bxUswIvR7b1rA8txQ2Rtyl25eNxQWvtBet3bytcH6RpMKvJdyZcSioOtKa5sYL4uRI4FOoFrfUzX5P_pjpK-cAN8Bdf6otVcK4myQl66GohjWiPVOyCuofXOq8M4lQkmsxucwQ&lib=MfQh9XKIUpdlMRcOJ4l9JImAGFOlNCMp3";

const STORAGE_KEY="alerts_lues";

function getLues(){
try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}
catch(e){return[];}
}

function parseDateFR(str){
if(!str)return null;
if(str.includes("-")){const p=str.split("-");return new Date(p[0],p[1]-1,p[2]);}
if(str.includes("/")){const p=str.split("/");return new Date(p[2],p[1]-1,p[0]);}
return null;
}

async function updateBell(){

const badge=document.getElementById("bellBadge");

try{

const res=await fetch(API_URL,{cache:"no-store"});
const data=await res.json();

const today=new Date();
today.setHours(0,0,0,0);

const lues=getLues().map(String);
let count=0;

data.filter(n=>{
if(n.epingle==="oui")return true;
if(n.active!=="oui")return false;

if(!n.expire){
const d=parseDateFR(n.date);
if(!d)return true;
return d>=today;
}

const exp=parseDateFR(n.expire);
if(!exp)return true;
return exp>=today;

}).forEach(n=>{
if(!lues.includes(String(n.id))){
count++;
}
});

badge.style.display=count>0?"flex":"none";
badge.textContent=count;

}catch(e){
badge.style.display="none";
}

}

updateBell();
setInterval(updateBell,60000);

</script>
