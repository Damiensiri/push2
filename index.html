<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecurie Damien Siri</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="image/icon-192x192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ecurie DS">
<meta name="theme-color" content="#f4f4f4">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ================= VARIABLES ================= */

:root{
  --bg:#f4f4f4;
  --header-bg:#f4f4f4;
  --text:#181E3B;
  --card-bg:#ffffff;
  --section-bg:#181E3B;
  --section-text:#ffffff;
  --shadow:0 6px 18px rgba(0,0,0,0.08);
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f1115;
    --header-bg:#0f1115;
    --text:#ffffff;
    --card-bg:#1c1f26;
    --section-bg:#ffffff;
    --section-text:#000000;
    --shadow:0 10px 30px rgba(0,0,0,0.6);
  }

  .header-left img{
    filter:brightness(0) invert(1)
           drop-shadow(0 0 6px rgba(255,255,255,0.5));
  }
}

/* ================= BASE ================= */

html, body{
  margin:0;
  height:100%;
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= HEADER ================= */

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:64px;
  background:var(--header-bg);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-left{
  position:absolute;
  left:12px;
}

.header-left img{
  height:40px;
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:700;
}

/* ================= BELL ================= */

#bellBox{
  position:absolute;
  right:12px;
  font-size:22px;
  cursor:pointer;
}

#bellBadge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  width:16px;
  height:16px;
  font-size:10px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* ================= SCROLL ================= */

.page-content{
  position:fixed;
  top:20px;
  left:0;
  right:0;
  bottom:0;
  overflow-y:auto;
  padding-bottom:20px;
}

.page-content::-webkit-scrollbar{
  display:none;
}

/* ================= TITLES ================= */

#welcome{
  text-align:center;
  font-size:44px;
  font-weight:700;
  margin:35px 0 16px;
}

#opening-status{
  text-align:center;
  margin-bottom:16px;
  display:none;
  font-size:15px;
  font-weight:600;
}

/* ================= ALERT ================= */

#alert-wrapper{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
}

#alert-box{
  width:100%;
  height:27px;
  background:#E88B00;
  display:none;
  align-items:center;
  gap:8px;
  padding:0 12px;
  color:white;
  font-size:14px;
  transform:translateY(-100%);
  opacity:0;
  transition:transform .4s ease, opacity .4s ease;
}

#alert-box.show{
  transform:translateY(0);
  opacity:1;
}

/* ================= SECTIONS ================= */

.section-title{
  background:var(--section-bg);
  color:var(--section-text);
  display:inline-block;
  padding:6px 14px;
  margin:20px 15px 10px;
  border-radius:6px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:0 15px;
}

.card{
  background:var(--card-bg);
  border-radius:22px;
  padding:22px;
  text-align:center;
  box-shadow:var(--shadow);
  cursor:pointer;
}

.card img{
  width:55px;
  margin-bottom:12px;
}

.card div{
  font-size:16px;
  font-weight:700;
}

.list-btn{
  background:var(--card-bg);
  margin:12px 15px;
  padding:18px;
  border-radius:22px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:var(--shadow);
  font-weight:700;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="image/logo.png">
  </div>

  <h1>ECURIE DAMIEN SIRI</h1>

  <div id="bellBox" onclick="go('notifications.html')">
    🔔
    <span id="bellBadge"></span>
  </div>
</header>

<div class="page-content">

<div id="welcome">BIENVENUE</div>

<div id="opening-status"></div>

<div id="alert-wrapper">
  <div id="alert-box"></div>
</div>

<div class="section-title">ESPACES</div>

<div class="grid">
  <div class="card" onclick="go('travail.html')"><img src="image/travail.svg"><div>TRAVAIL</div></div>
  <div class="card" onclick="go('paddocks.html')"><img src="image/paddock.svg"><div>PADDOCK</div></div>
</div>

<div class="list-btn" onclick="go('plan.html')"><img src="image/plan.svg"> PLAN INTERACTIF</div>

<div class="section-title">PRATIQUE</div>

<div class="grid">
  <div class="card" onclick="go('horaires.html')"><img src="image/time.svg"><div>HORAIRES</div></div>
  <div class="card" onclick="go('meteo.html')"><img src="image/meteo.svg"><div>MÉTÉO</div></div>
  <div class="card" onclick="openExternal('https://ce-grand-rang.cavasoft.fr')"><img src="image/cavasoft.svg"><div>COURS</div></div>
  <div class="card" onclick="openExternal('https://www.ce-dugrandrang.com/book-online?category=194a368e-8a4f-4212-a33e-ae1656e4de8a')"><img src="image/service.svg"><div>SERVICES</div></div>
  <div class="card" onclick="go('concours.html')"><img src="image/concours.svg"><div>CONCOURS</div></div>
  <div class="card" onclick="openExternal('https://www.ce-dugrandrang.com/category/soins')"><img src="image/soins.svg"><div>SOINS</div></div>
</div>

</div>

<script>

function go(url){ window.location.href=url; }
function openExternal(url){ window.open(url,"_blank"); }

const STATUTS_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=statuts";
const HORAIRES_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=horaires";
const EXCEPTIONS_URL="https://script.google.com/macros/s/AKfycbzWEB8PPqSQ4rinnTbh4414U3QPX836XtPOPBmKr0Bw2W4mRFWAl7Chv6WKHOjrcWoZew/exec?sheet=exceptions";

function formatTime(val){
if(!val) return "--:--";
if(val.includes("T")){
const d=new Date(val);
return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
}
return val.substring(0,5);
}

function fetchHoraires(){
return fetch(HORAIRES_URL+"&t="+Date.now(),{cache:"no-store"})
.then(r=>r.json())
.then(data=>localStorage.setItem("horaires",JSON.stringify(data)));
}

function fetchExceptions(){
return fetch(EXCEPTIONS_URL+"&t="+Date.now(),{cache:"no-store"})
.then(r=>r.json())
.then(data=>localStorage.setItem("exceptions",JSON.stringify(data)));
}

function fetchStatuts(){
fetch(STATUTS_URL+"&t="+Date.now(),{cache:"no-store"})
.then(r=>r.json())
.then(data=>{
localStorage.setItem("statuts",JSON.stringify(data));
updateUI(data);
});
}

function updateUI(data){

const alertBox=document.getElementById("alert-box");
const status=document.getElementById("opening-status");

alertBox.classList.remove("show");
alertBox.style.display="none";

const row=data.find(e=>e.espace==="accueil");

if(row && row.alerte && row.alerte.trim()!==""){
alertBox.style.display="flex";
alertBox.innerHTML=`<img src="https://static.wixstatic.com/shapes/ff7f34_8db0b910e97b4e37af20514452d5c4f4.svg" width="16"> ${row.alerte}`;
setTimeout(()=>alertBox.classList.add("show"),50);
return;
}

const exceptions=JSON.parse(localStorage.getItem("exceptions")||"[]");

const todayName=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"][new Date().getDay()];

let ex=null;

exceptions.forEach(e=>{
if(!e.date) return;
const d=new Date(e.date);
const day=d.toLocaleDateString("fr-FR",{weekday:"long"}).toLowerCase();
if(day===todayName){ ex=e; }
});

if(ex){
status.style.display="block";
status.style.color="#c0392b";
status.textContent=ex.message;
return;
}

const horaires=JSON.parse(localStorage.getItem("horaires")||"[]");

const h=horaires.find(r=>r.jour?.toLowerCase()===todayName);

if(!h) return;

const open=formatTime(h.ouvert);
const close=formatTime(h.ferme);

status.style.display="block";

const [oh,om]=open.split(":");
const [ch,cm]=close.split(":");

const now=new Date();
const o=new Date();o.setHours(oh,om,0,0);
const c=new Date();c.setHours(ch,cm,0,0);

if(now>=o && now<=c){
status.style.color="#2e7d32";
status.textContent=`Écuries ouvertes ${open} – ${close}`;
}else{
status.style.color="#c0392b";
status.textContent=`Écuries fermées ${open} – ${close}`;
}

}

async function start(){
await Promise.all([fetchHoraires(),fetchExceptions()]);
fetchStatuts();
}

start();

setInterval(fetchStatuts,10000);
setInterval(fetchHoraires,60000);
setInterval(fetchExceptions,60000);

["paddocks.html","travail.html","plan.html","horaires.html"].forEach(p=>{
fetch(p,{cache:"force-cache"}).catch(()=>{});
});

</script>

<script>

</body>
</html>
