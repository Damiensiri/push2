<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecurie Damien Siri</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="image/icon-192x192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ecurie DS">
<meta name="theme-color" content="#f4f4f4">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ===== FOND PADDOCK ===== */

body{
margin:0;
font-family:'Montserrat',sans-serif;
overflow-y:auto;
background:#f4f4f4;
}

/* image paddock */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("image/paddock-bg.jpg") center/cover no-repeat;
z-index:0;
animation:bgZoom 40s ease-in-out infinite;
}

/* voile lisibilité */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
180deg,
rgba(255,255,255,0.85) 0%,
rgba(255,255,255,0.75) 40%,
rgba(255,255,255,0.9) 100%
);
z-index:0;
}

/* animation douce */
@keyframes bgZoom{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* contenu au-dessus */
.page-content{
position:relative;
z-index:1;
}

/* ===== HEADER ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
z-index:1000;
display:flex;
align-items:center;
justify-content:center;
}

.header-left{
position:absolute;
left:12px;
}

.header-left img{
height:40px;
}

header h1{
margin:0;
font-size:20px;
font-weight:700;
color:#181E3B;
}

/* ===== CLOCHE ===== */

#bellBox{
position:absolute;
right:12px;
font-size:22px;
cursor:pointer;
}

#bellBadge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
width:16px;
height:16px;
font-size:10px;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
}

/* ===== PAGE ===== */

.page-content{
margin-top:70px;
padding-bottom:40px;
}

/* ===== TITRES ===== */

#welcome{
text-align:center;
font-size:36px;
font-weight:700;
color:#181E3B;
margin:4px 0 10px;
}

#opening-status{
text-align:center;
font-size:14px;
font-weight:700;
margin-bottom:8px;
}

/* ===== BANDEAU ===== */

#alert-box{
display:none;
background:#E88B00;
color:white;
padding:8px 12px;
font-size:12px;
font-weight:600;
margin:10px 0 15px;
align-items:center;
gap:8px;
}

/* ===== SECTIONS ===== */

.section-title{
background:#181E3B;
color:white;
display:inline-block;
padding:6px 12px;
margin:20px 15px 10px;
border-radius:4px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px 14px;
padding:0 15px;
margin-bottom:10px;
}

/* ===== CARDS ===== */

.card{
background:rgba(255,255,255,0.85);
border-radius:16px;
height:95px;
width:92%;
margin:0 auto;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
cursor:pointer;
transition:transform 0.15s ease;
}

.card:active{
transform:scale(0.97);
}

.card img{
width:34px;
margin-bottom:4px;
}

.card div{
font-size:12px;
font-weight:700;
}

/* ===== LIST BTN ===== */

.list-btn{
background:rgba(255,255,255,0.85);
margin:18px auto;
padding:16px 16px;
border-radius:18px;
width:88%;
display:flex;
align-items:center;
gap:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
font-weight:700;
cursor:pointer;
}

.list-btn img{
width:22px;
}

/* ===== DARK MODE ===== */

@media (prefers-color-scheme: dark){

body::after{
background:linear-gradient(
180deg,
rgba(5,7,12,0.7),
rgba(5,7,12,0.85)
);
}

header{
background:rgba(10,12,18,0.6);
}

header h1,
#welcome{
color:white;
}

.header-left img{
filter:brightness(0) invert(1);
}

.card,
.list-btn{
background:rgba(27,31,42,0.85);
color:white;
}

}

</style>
</head>

<body>

<header>
<div class="header-left">
<img src="image/logo.png">
</div>

<h1>ECURIE DAMIEN SIRI</h1>

<div id="bellBox">🔔<span id="bellBadge"></span></div>
</header>

<div class="page-content">

<div id="welcome">BIENVENUE</div>
<div id="opening-status"></div>
<div id="alert-box"></div>

<div class="section-title">ESPACES</div>

<div class="grid">
<div class="card">TRAVAIL</div>
<div class="card">PADDOCK</div>
</div>

</div>

</body>
</html>
