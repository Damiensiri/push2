<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecurie Damien Siri</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="image/icon-192x192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ecurie DS">
<meta name="theme-color" content="#f4f4f4">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
await OneSignal.init({
appId:"85a477ff-3d8d-4975-960d-c7e69100a0ff",
notifyButton:{enable:false},
promptOptions:{
slidedown:{
prompts:[{
type:"push",
autoPrompt:true,
text:{
actionMessage:"Souhaitez-vous recevoir les notifications de l’écurie ?",
acceptButton:"Autoriser",
cancelButton:"Plus tard"
}
}]
}
}
});
});
</script>

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f4f4;
overflow-y:auto;
}

/* ===== FOND ===== */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("image/02F829CD-3211-4373-A1B6-03DBA17F2739.png") center/cover no-repeat;
z-index:0;
}

/* ===== CHEVAL RÉALISTE ===== */

.horse{
position:fixed;
bottom:15px;
left:-150px;
width:180px;
opacity:0.18;
z-index:0;
pointer-events:none;

animation:horseWalk 25s linear infinite;
}

/* silhouette réaliste */
.horse path{
fill:#000;
}

/* animation déplacement */
@keyframes horseWalk{
0%{transform:translateX(0);}
100%{transform:translateX(130vw);}
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:#f4f4f4;
z-index:1000;
display:flex;
align-items:center;
justify-content:center;
}

/* contenu au-dessus */

.page-content{
position:relative;
z-index:1;
margin-top:70px;
padding-bottom:40px;
}

/* ===== RESTE IDENTIQUE ===== */

.header-left{
position:absolute;
left:12px;
}

.header-left img{
height:40px;
}

header h1{
margin:0;
font-size:20px;
font-weight:700;
color:#181E3B;
}

#bellBox{
position:absolute;
right:12px;
font-size:22px;
cursor:pointer;
}

#bellBadge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
width:16px;
height:16px;
font-size:10px;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
}

#welcome{
text-align:center;
font-size:36px;
font-weight:700;
color:#181E3B;
margin:4px 0 10px;
}

#opening-status{
text-align:center;
font-size:14px;
font-weight:700;
margin-bottom:8px;
}

#alert-box{
display:none;
background:#E88B00;
color:white;
padding:8px 12px;
font-size:12px;
font-weight:600;
margin:10px 0 15px;
}

.section-title{
background:#181E3B;
color:white;
display:inline-block;
padding:6px 12px;
margin:20px 15px 10px;
border-radius:4px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px 14px;
padding:0 15px;
margin-bottom:10px;
}

.card{
background:white;
border-radius:16px;
height:95px;
width:92%;
margin:0 auto;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
cursor:pointer;
}

.card img{
width:34px;
margin-bottom:4px;
}

.list-btn{
background:white;
margin:18px auto;
padding:16px;
border-radius:18px;
width:88%;
display:flex;
align-items:center;
gap:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
font-weight:700;
cursor:pointer;
}

.list-btn img{
width:22px;
}

/* DARK */

@media (prefers-color-scheme: dark){

body{
background:#05070c;
color:white;
}

header{
background:#05070c;
}

header h1{
color:white;
}

.header-left img{
filter:brightness(0) invert(1);
}

.card,
.list-btn{
background:#1b1f2a;
color:white;
}

.horse{
opacity:0.12;
filter:invert(1);
}

}

</style>
</head>

<body>

</svg>

<header>
<div class="header-left">
<img src="image/logo.png">
</div>

<h1>ECURIE DAMIEN SIRI</h1>

<div id="bellBox" onclick="go('notifications.html')">
🔔
<span id="bellBadge"></span>
</div>
</header>
