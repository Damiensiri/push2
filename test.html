<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Ecurie Damien Siri</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */

body{
margin:0;
font-family:'Montserrat',sans-serif;
overflow-x:hidden;
background:#f4f4f4;
}

/* ===== LAYER 1 : IMAGE PADDOCK ===== */

.bg{
position:fixed;
top:0;
left:0;
width:110%;
height:110%;
background:url("image/paddock-bg.jpg") center/cover no-repeat;
z-index:0;

will-change:transform;
animation:bgMove 60s ease-in-out infinite;
}

/* ===== LAYER 2 : LUMIÈRE ===== */

.light{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 60% 30%, rgba(255,200,120,0.25), transparent 60%),
linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.75));
z-index:1;

animation:lightPulse 18s ease-in-out infinite;
}

/* ===== LAYER 3 : NUAGES LÉGERS ===== */

.clouds{
position:fixed;
top:0;
left:0;
width:200%;
height:100%;
opacity:0.05;
background:url("https://www.transparenttextures.com/patterns/clouds.png");
z-index:2;

animation:cloudMove 120s linear infinite;
}

/* ===== CONTENT ===== */

.page-content{
position:relative;
z-index:3;
padding-top:80px;
padding-bottom:40px;
}

/* ===== HEADER ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
z-index:10;
display:flex;
align-items:center;
justify-content:center;
}

header h1{
font-size:18px;
margin:0;
color:#181E3B;
}

/* ===== UI ===== */

#welcome{
text-align:center;
font-size:32px;
font-weight:700;
color:#181E3B;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:0 12px;
}

.card{
background:rgba(255,255,255,0.85);
border-radius:16px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
box-shadow:0 6px 20px rgba(0,0,0,0.15);

will-change:transform;
animation:cardFloat 6s ease-in-out infinite;
}

.card:nth-child(2){animation-delay:1s;}

/* ===== ANIMATIONS ===== */

@keyframes bgMove{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-2%, -2%) scale(1.05);}
100%{transform:translate(0,0) scale(1);}
}

@keyframes lightPulse{
0%{opacity:0.9;}
50%{opacity:1;}
100%{opacity:0.9;}
}

@keyframes cloudMove{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

@keyframes cardFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-3px);}
100%{transform:translateY(0);}
}

/* ===== DARK MODE ===== */

@media (prefers-color-scheme: dark){

.light{
background:
radial-gradient(circle at 60% 30%, rgba(255,140,0,0.15), transparent 60%),
linear-gradient(180deg, rgba(5,7,12,0.8), rgba(5,7,12,0.9));
}

header{
background:rgba(10,12,18,0.6);
}

header h1,
#welcome{
color:white;
}

.card{
background:rgba(27,31,42,0.85);
color:white;
}

}

</style>
</head>

<body>

<!-- LAYERS -->
<div class="bg"></div>
<div class="light"></div>
<div class="clouds"></div>

<header>
<h1>ECURIE DAMIEN SIRI</h1>
</header>

<div class="page-content">

<div id="welcome">BIENVENUE</div>

<div class="grid">
<div class="card">TRAVAIL</div>
<div class="card">PADDOCK</div>
</div>

</div>

</body>
</html>
