<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecurie Damien Siri</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:'Montserrat',sans-serif;
overflow-y:auto;
background:#f4f4f4;
}

/* ===== PADDOCK ===== */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("image/paddock-bg.jpg") center/cover no-repeat;
z-index:0;

/* mouvement lent */
animation:moveBg 60s ease-in-out infinite;
}

/* ===== LUMIÈRE / ATMOSPHÈRE ===== */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 50% 30%, rgba(255,200,120,0.25), transparent 60%),
linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.75));
z-index:0;

animation:lightShift 20s ease-in-out infinite;
}

/* ===== NUAGES ===== */

.clouds{
position:fixed;
top:0;
left:0;
width:200%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/clouds.png");
opacity:0.08;
z-index:0;

animation:cloudMove 120s linear infinite;
}

/* ===== CONTENU ===== */

.page-content{
position:relative;
z-index:1;
margin-top:70px;
padding-bottom:40px;
}

/* ===== HEADER ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
z-index:1000;
display:flex;
align-items:center;
justify-content:center;
}

.header-left{
position:absolute;
left:12px;
}

.header-left img{
height:40px;
}

header h1{
margin:0;
font-size:20px;
font-weight:700;
color:#181E3B;
}

/* ===== TITRES ===== */

#welcome{
text-align:center;
font-size:36px;
font-weight:700;
color:#181E3B;
margin:4px 0 10px;
}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px 14px;
padding:0 15px;
}

/* ===== CARDS ===== */

.card{
background:rgba(255,255,255,0.85);
border-radius:16px;
height:95px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 25px rgba(0,0,0,0.2);

/* petit flottement */
animation:floatCard 6s ease-in-out infinite;
}

.card:nth-child(2){
animation-delay:1s;
}

.card:nth-child(3){
animation-delay:2s;
}

/* ===== ANIMATIONS ===== */

@keyframes moveBg{
0%{transform:scale(1) translate(0,0);}
50%{transform:scale(1.05) translate(-1%, -1%);}
100%{transform:scale(1) translate(0,0);}
}

@keyframes lightShift{
0%{opacity:0.9;}
50%{opacity:1;}
100%{opacity:0.9;}
}

@keyframes cloudMove{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

@keyframes floatCard{
0%{transform:translateY(0);}
50%{transform:translateY(-4px);}
100%{transform:translateY(0);}
}

/* ===== DARK MODE ===== */

@media (prefers-color-scheme: dark){

body::after{
background:
radial-gradient(circle at 50% 30%, rgba(255,140,0,0.15), transparent 60%),
linear-gradient(180deg, rgba(5,7,12,0.8), rgba(5,7,12,0.9));
}

header{
background:rgba(10,12,18,0.6);
}

header h1,
#welcome{
color:white;
}

.header-left img{
filter:brightness(0) invert(1);
}

.card{
background:rgba(27,31,42,0.85);
color:white;
}

}

</style>
</head>

<body>

<div class="clouds"></div>

<header>
<div class="header-left">
<img src="image/logo.png">
</div>
<h1>ECURIE DAMIEN SIRI</h1>
</header>

<div class="page-content">

<div id="welcome">BIENVENUE</div>

<div class="grid">
<div class="card">TRAVAIL</div>
<div class="card">PADDOCK</div>
</div>

</div>

</body>
</html>
